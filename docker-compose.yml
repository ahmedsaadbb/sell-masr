

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: sellmasr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sellmasr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://sellmasr:password@db:5432/sellmasr
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:3001","http://localhost:5173"]
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    restart: always
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000

  frontend-storefront:
    build:
      context: ./frontend-storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000

volumes:
  postgres_data:
  uploads_data:
